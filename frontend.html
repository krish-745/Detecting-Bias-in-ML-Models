<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bias Diagnostic Clinic</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap');

  :root {
    --bg: #09090f;
    --bg2: #0f0f1a;
    --bg3: #14141f;
    --surface: #1a1a2e;
    --surface2: #1f1f35;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f8;
    --text2: #9090b8;
    --text3: #5a5a80;
    --accent: #6366f1;
    --accent2: #818cf8;
    --accent3: #c7d2fe;
    --pass: #10b981;
    --pass-bg: rgba(16,185,129,0.08);
    --warn: #f59e0b;
    --warn-bg: rgba(245,158,11,0.08);
    --fail: #ef4444;
    --fail-bg: rgba(239,68,68,0.08);
    --radius: 12px;
    --radius2: 8px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events:none;
    z-index:0;
    opacity:0.4;
  }

  /* Grid background */
  body::after {
    content:'';
    position:fixed;
    inset:0;
    background-image: linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events:none;
    z-index:0;
  }

  #root { position:relative; z-index:1; }

  /* ── HEADER ── */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    background: rgba(9,9,15,0.8);
    backdrop-filter: blur(20px);
    position: sticky;
    top:0;
    z-index:100;
  }
  .header-logo {
    display:flex;
    align-items:center;
    gap:12px;
    font-family:'Syne',sans-serif;
    font-weight:800;
    font-size:18px;
    letter-spacing:-0.02em;
  }
  .logo-icon {
    width:32px; height:32px;
    background: linear-gradient(135deg, var(--accent), #a855f7);
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:16px;
  }
  .header-badge {
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    background: rgba(99,102,241,0.15);
    border:1px solid rgba(99,102,241,0.3);
    color:var(--accent2);
    padding:3px 10px;
    border-radius:100px;
    letter-spacing:0.05em;
  }

  /* ── HERO ── */
  .hero {
    padding: 72px 40px 48px;
    max-width:1100px;
    margin:0 auto;
  }
  .hero-label {
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--accent2);
    letter-spacing:0.15em;
    text-transform:uppercase;
    margin-bottom:16px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .hero-label::before {
    content:'';
    width:24px;
    height:1px;
    background:var(--accent2);
  }
  .hero h1 {
    font-family:'Syne',sans-serif;
    font-size:clamp(36px,5vw,60px);
    font-weight:800;
    letter-spacing:-0.04em;
    line-height:1.05;
    margin-bottom:16px;
  }
  .hero h1 span {
    background: linear-gradient(135deg, var(--accent2), #a78bfa, #818cf8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .hero-desc {
    font-size:16px;
    color:var(--text2);
    line-height:1.6;
    max-width:560px;
    font-weight:300;
  }

  /* ── MAIN LAYOUT ── */
  .main {
    max-width:1100px;
    margin:0 auto;
    padding:0 40px 80px;
  }

  /* ── UPLOAD ZONE ── */
  .upload-zone {
    border:2px dashed var(--border2);
    border-radius:var(--radius);
    padding:48px 32px;
    text-align:center;
    cursor:pointer;
    transition:all 0.2s ease;
    background:var(--bg2);
    position:relative;
    overflow:hidden;
  }
  .upload-zone::before {
    content:'';
    position:absolute;
    inset:0;
    background:radial-gradient(ellipse at center, rgba(99,102,241,0.04) 0%, transparent 70%);
    pointer-events:none;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color:var(--accent);
    background:rgba(99,102,241,0.04);
  }
  .upload-icon {
    width:56px; height:56px;
    background:var(--surface);
    border:1px solid var(--border2);
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 20px;
    font-size:24px;
  }
  .upload-zone h3 {
    font-family:'Syne',sans-serif;
    font-size:18px;
    font-weight:700;
    margin-bottom:8px;
  }
  .upload-zone p {
    color:var(--text2);
    font-size:14px;
  }
  .upload-file-name {
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    background:var(--pass-bg);
    border:1px solid rgba(16,185,129,0.2);
    color:var(--pass);
    padding:8px 16px;
    border-radius:100px;
    margin-top:12px;
  }

  /* ── CONFIG GRID ── */
  .config-grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    margin:32px 0;
  }
  @media(max-width:768px){.config-grid{grid-template-columns:1fr;}}

  .config-card {
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:24px;
  }
  .config-card h4 {
    font-family:'Syne',sans-serif;
    font-size:13px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--text2);
    margin-bottom:16px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .config-card h4 .dot {
    width:6px; height:6px;
    border-radius:50%;
    background:var(--accent);
  }

  .field { margin-bottom:14px; }
  .field:last-child { margin-bottom:0; }
  .field label {
    display:block;
    font-size:12px;
    color:var(--text3);
    font-family:'JetBrains Mono',monospace;
    letter-spacing:0.05em;
    text-transform:uppercase;
    margin-bottom:6px;
  }
  .field select, .field input[type="text"], .field input[type="number"] {
    width:100%;
    background:var(--bg3);
    border:1px solid var(--border2);
    border-radius:var(--radius2);
    color:var(--text);
    font-size:14px;
    font-family:'Inter',sans-serif;
    padding:9px 12px;
    outline:none;
    transition:border-color 0.15s;
    -webkit-appearance:none;
  }
  .field select:focus, .field input:focus {
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(99,102,241,0.1);
  }
  .field select option { background:var(--bg3); }

  /* Slider */
  .slider-wrap { display:flex; align-items:center; gap:12px; }
  .slider-wrap input[type="range"] {
    flex:1;
    -webkit-appearance:none;
    height:4px;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--pct, 50%), var(--border2) var(--pct, 50%));
    border-radius:2px;
    outline:none;
    cursor:pointer;
  }
  .slider-wrap input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance:none;
    width:16px; height:16px;
    background:var(--accent2);
    border-radius:50%;
    border:2px solid var(--bg);
    box-shadow:0 0 0 3px rgba(99,102,241,0.2);
    cursor:pointer;
  }
  .slider-val {
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--accent2);
    min-width:36px;
    text-align:right;
  }

  /* ── RUN BUTTON ── */
  .run-btn {
    width:100%;
    padding:16px;
    background:linear-gradient(135deg, var(--accent), #7c3aed);
    border:none;
    border-radius:var(--radius);
    color:#fff;
    font-family:'Syne',sans-serif;
    font-size:16px;
    font-weight:700;
    letter-spacing:0.02em;
    cursor:pointer;
    transition:all 0.2s ease;
    position:relative;
    overflow:hidden;
  }
  .run-btn::before {
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    opacity:0;
    transition:opacity 0.2s;
  }
  .run-btn:hover::before { opacity:1; }
  .run-btn:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(99,102,241,0.3); }
  .run-btn:active { transform:translateY(0); }
  .run-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; box-shadow:none; }

  /* ── RESULTS HEADER ── */
  .results-header {
    display:flex;
    align-items:center;
    gap:16px;
    margin:48px 0 32px;
    padding-bottom:24px;
    border-bottom:1px solid var(--border);
  }
  .results-header h2 {
    font-family:'Syne',sans-serif;
    font-size:28px;
    font-weight:800;
    letter-spacing:-0.03em;
    flex:1;
  }

  /* ── SECTION ── */
  .section { margin-bottom:40px; }
  .section-header {
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:20px;
  }
  .section-number {
    width:32px; height:32px;
    background:var(--surface);
    border:1px solid var(--border2);
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    color:var(--accent2);
    font-weight:500;
    flex-shrink:0;
  }
  .section-title {
    font-family:'Syne',sans-serif;
    font-size:18px;
    font-weight:700;
    letter-spacing:-0.02em;
  }

  /* ── RESULT CARDS ── */
  .result-card {
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:28px;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to { opacity:1; transform:translateY(0); }
  }
  .result-card:nth-child(2){animation-delay:0.05s;}
  .result-card:nth-child(3){animation-delay:0.1s;}
  .result-card:nth-child(4){animation-delay:0.15s;}

  /* Status badge */
  .badge {
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    font-weight:500;
    padding:5px 12px;
    border-radius:100px;
    letter-spacing:0.05em;
  }
  .badge.pass { background:var(--pass-bg); color:var(--pass); border:1px solid rgba(16,185,129,0.2); }
  .badge.fail { background:var(--fail-bg); color:var(--fail); border:1px solid rgba(239,68,68,0.2); }
  .badge.warn { background:var(--warn-bg); color:var(--warn); border:1px solid rgba(245,158,11,0.2); }
  .badge::before {
    content:'';
    width:6px; height:6px;
    border-radius:50%;
    background:currentColor;
    animation:pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100%{opacity:1;}
    50%{opacity:0.4;}
  }

  /* Metric big number */
  .metric-row { display:flex; align-items:baseline; gap:10px; margin:16px 0 8px; }
  .metric-big {
    font-family:'Syne',sans-serif;
    font-size:44px;
    font-weight:800;
    letter-spacing:-0.04em;
    line-height:1;
  }
  .metric-big.good { color:var(--pass); }
  .metric-big.bad { color:var(--fail); }
  .metric-big.neutral { color:var(--text); }
  .metric-label { color:var(--text2); font-size:14px; }

  .threshold-line {
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--text3);
    margin-top:4px;
  }

  /* ── BAR CHARTS ── */
  .bar-chart { margin-top:20px; }
  .bar-row {
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:10px;
  }
  .bar-label {
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--text2);
    width:90px;
    flex-shrink:0;
    text-overflow:ellipsis;
    overflow:hidden;
    white-space:nowrap;
  }
  .bar-track {
    flex:1;
    height:28px;
    background:var(--bg3);
    border-radius:4px;
    overflow:hidden;
    position:relative;
  }
  .bar-fill {
    height:100%;
    border-radius:4px;
    transition:width 0.8s cubic-bezier(0.16,1,0.3,1);
    display:flex;
    align-items:center;
    padding-left:10px;
    font-size:12px;
    font-family:'JetBrains Mono',monospace;
    color:rgba(255,255,255,0.85);
    min-width:32px;
  }
  .bar-fill.good { background:linear-gradient(90deg,var(--pass),rgba(16,185,129,0.6)); }
  .bar-fill.bad { background:linear-gradient(90deg,var(--fail),rgba(239,68,68,0.6)); }
  .bar-fill.neutral { background:linear-gradient(90deg,var(--accent),rgba(99,102,241,0.6)); }
  .bar-count {
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--text3);
    width:60px;
    text-align:right;
    flex-shrink:0;
  }
  .danger-line {
    position:absolute;
    top:0; bottom:0;
    border-left:2px dashed var(--fail);
    opacity:0.6;
  }

  /* ── TABLE ── */
  .data-table { width:100%; border-collapse:collapse; margin-top:16px; }
  .data-table th {
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--text3);
    padding:8px 12px;
    text-align:left;
    border-bottom:1px solid var(--border);
  }
  .data-table td {
    padding:10px 12px;
    font-size:13px;
    border-bottom:1px solid var(--border);
    font-family:'JetBrains Mono',monospace;
    color:var(--text2);
  }
  .data-table tr:last-child td { border-bottom:none; }
  .data-table tr:hover td { background:rgba(255,255,255,0.02); }
  .td-val { color:var(--text); }
  .td-good { color:var(--pass); }
  .td-bad { color:var(--fail); }

  /* ── PROXY GROUPED BARS ── */
  .proxy-feature {
    background:var(--bg3);
    border:1px solid var(--border);
    border-radius:var(--radius2);
    padding:16px 20px;
    margin-bottom:12px;
  }
  .proxy-feature-name {
    font-family:'Syne',sans-serif;
    font-size:14px;
    font-weight:700;
    margin-bottom:12px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .proxy-mini-bars { display:flex; gap:8px; }
  .proxy-mini-bar-wrap { flex:1; }
  .proxy-mini-label {
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--text3);
    text-transform:uppercase;
    letter-spacing:0.08em;
    margin-bottom:4px;
  }
  .proxy-mini-track {
    height:8px;
    background:var(--surface);
    border-radius:4px;
    overflow:hidden;
  }
  .proxy-mini-fill {
    height:100%;
    border-radius:4px;
    transition:width 0.8s cubic-bezier(0.16,1,0.3,1);
  }
  .pmf-cov { background:var(--accent); }
  .pmf-mi  { background:#a855f7; }
  .pmf-rf  { background:#ec4899; }
  .proxy-mini-val {
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--text2);
    margin-top:3px;
  }

  /* ── INTERSECTIONAL TABLE ── */
  .rate-pill {
    display:inline-block;
    padding:3px 10px;
    border-radius:100px;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
  }

  /* ── LOADING ── */
  .loading-wrap {
    padding:64px 32px;
    text-align:center;
  }
  .spinner {
    width:48px; height:48px;
    border:3px solid var(--border2);
    border-top-color:var(--accent);
    border-radius:50%;
    animation:spin 0.8s linear infinite;
    margin:0 auto 24px;
  }
  @keyframes spin { to{transform:rotate(360deg);} }
  .loading-wrap p {
    color:var(--text2);
    font-size:15px;
  }
  .loading-steps {
    margin-top:20px;
    display:flex;
    flex-direction:column;
    gap:8px;
    align-items:center;
  }
  .loading-step {
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--text3);
    display:flex;
    align-items:center;
    gap:8px;
    animation:fadeIn 0.4s ease both;
  }
  .loading-step.active { color:var(--accent2); }
  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

  /* ── ERROR ── */
  .error-card {
    background:var(--fail-bg);
    border:1px solid rgba(239,68,68,0.2);
    border-radius:var(--radius);
    padding:20px 24px;
    color:var(--fail);
    font-size:14px;
    display:flex;
    align-items:flex-start;
    gap:12px;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    padding:80px 32px;
    text-align:center;
    color:var(--text3);
  }
  .empty-icon { font-size:48px; margin-bottom:16px; opacity:0.4; }
  .empty-state p { font-size:15px; }

  /* ── DIVIDER ── */
  .divider {
    height:1px;
    background:var(--border);
    margin:32px 0;
  }

  /* ── TOOLTIP ── */
  .info-tip {
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:16px; height:16px;
    border-radius:50%;
    background:var(--surface2);
    font-size:10px;
    color:var(--text3);
    cursor:help;
    position:relative;
    margin-left:6px;
  }
  .info-tip:hover::after {
    content:attr(data-tip);
    position:absolute;
    bottom:calc(100% + 8px);
    left:50%;
    transform:translateX(-50%);
    background:var(--surface2);
    border:1px solid var(--border2);
    border-radius:6px;
    padding:8px 12px;
    font-size:12px;
    white-space:nowrap;
    color:var(--text2);
    z-index:100;
    pointer-events:none;
    font-family:'Inter',sans-serif;
    max-width:240px;
    white-space:normal;
    text-align:center;
    line-height:1.4;
  }

  /* ── PROGRESS BAR ── */
  .gauge-wrap { margin:20px 0; }
  .gauge-track {
    height:12px;
    background:var(--bg3);
    border-radius:100px;
    overflow:hidden;
  }
  .gauge-fill {
    height:100%;
    border-radius:100px;
    background:linear-gradient(90deg, var(--fail) 0%, var(--warn) 50%, var(--pass) 80%);
    transition:width 1s cubic-bezier(0.16,1,0.3,1);
  }
  .gauge-ticks {
    display:flex;
    justify-content:space-between;
    margin-top:6px;
  }
  .gauge-tick {
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--text3);
  }

  /* ── TWO COL ── */
  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  @media(max-width:640px){ .two-col{grid-template-columns:1fr;} }

  .scroll-in {
    animation: fadeUp 0.5s ease both;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useRef, useEffect } = React;

/* ── utils ── */
const fmt = (v, d=3) => (typeof v === 'number' && !isNaN(v)) ? v.toFixed(d) : '—';
const pct = v => `${(v*100).toFixed(1)}%`;
const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi, v));

function parseCSV(text) {
  return new Promise(resolve => {
    Papa.parse(text, { header:true, skipEmptyLines:true, complete: r => resolve(r) });
  });
}

/* ── Slider component ── */
function Slider({ label, value, min, max, step=0.01, onChange, tooltip }) {
  const pct = ((value - min) / (max - min)) * 100;
  return (
    <div className="field">
      <label>{label}{tooltip && <span className="info-tip" data-tip={tooltip}>?</span>}</label>
      <div className="slider-wrap">
        <input type="range" min={min} max={max} step={step}
          value={value}
          style={{'--pct': `${pct}%`}}
          onChange={e => onChange(step < 1 ? parseFloat(e.target.value) : parseInt(e.target.value))}
        />
        <span className="slider-val">{step < 1 ? value.toFixed(2) : value}</span>
      </div>
    </div>
  );
}

/* ── BarChart ── */
function BarChart({ rows, dangerAt, colorFn }) {
  const max = Math.max(...rows.map(r => r.value), 1);
  return (
    <div className="bar-chart">
      {rows.map((row, i) => {
        const pct = clamp((row.value / max) * 100, 0, 100);
        const cls = colorFn ? colorFn(row) : 'neutral';
        return (
          <div key={i} className="bar-row">
            <span className="bar-label" title={row.label}>{row.label}</span>
            <div className="bar-track">
              {dangerAt != null && (
                <div className="danger-line" style={{left:`${clamp((dangerAt/max)*100,0,100)}%`}}/>
              )}
              <div className={`bar-fill ${cls}`} style={{width:`${pct}%`}}>
                {pct > 15 ? (row.displayVal ?? '') : ''}
              </div>
            </div>
            <span className="bar-count">{row.displayVal ?? row.value}</span>
          </div>
        );
      })}
    </div>
  );
}

/* ── Section wrapper ── */
function Section({ num, title, children }) {
  return (
    <div className="section scroll-in" style={{animationDelay:`${(num-1)*0.08}s`}}>
      <div className="section-header">
        <div className="section-number">{num}</div>
        <div className="section-title">{title}</div>
      </div>
      <div className="result-card">{children}</div>
    </div>
  );
}

/* ── DisparateImpact ── */
function DisparateImpactResult({ data }) {
  if (data.error) return <div className="error-card">⚠ {data.error}</div>;
  if (data.ratio == null) return <div className="error-card">⚠ Could not calculate — check class names.</div>;

  const pass = data.is_legal;
  const pctVal = clamp(data.ratio * 100, 0, 150);
  const gaugeWidth = clamp((data.ratio / 1.5) * 100, 0, 100);

  return (
    <div>
      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:12}}>
        <span className={`badge ${pass ? 'pass' : 'fail'}`}>{pass ? 'PASS' : 'FAIL'}</span>
        <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:13, color:'var(--text2)'}}>
          Threshold: {data.threshold}
        </span>
      </div>
      <div className="metric-row">
        <span className={`metric-big ${pass ? 'good' : 'bad'}`}>{fmt(data.ratio, 2)}</span>
        <span className="metric-label">Disparate Impact Ratio</span>
      </div>
      <p className="threshold-line">
        {pass
          ? `✓ Ratio ${fmt(data.ratio,2)} is above the ${data.threshold} legal threshold (4/5ths rule)`
          : `✗ Ratio ${fmt(data.ratio,2)} is below ${data.threshold} — Disparate Impact Detected`}
      </p>
      <div className="gauge-wrap">
        <div className="gauge-track">
          <div className="gauge-fill" style={{width:`${gaugeWidth}%`}}/>
        </div>
        <div className="gauge-ticks">
          <span className="gauge-tick">0</span>
          <span className="gauge-tick" style={{color:'var(--warn)'}}>0.8 (legal min)</span>
          <span className="gauge-tick">1.5+</span>
        </div>
      </div>
      <p style={{fontSize:13,color:'var(--text2)',marginTop:8,lineHeight:1.6}}>
        <strong style={{color:'var(--text)'}}>Interpretation:</strong> A score of 1.0 means perfect parity. Below 0.80 signals potential legal liability under the 4/5ths rule.
      </p>
    </div>
  );
}

/* ── DataDesert ── */
function DataDesertResult({ data }) {
  if (data.error) return <div className="error-card">⚠ {data.error}</div>;
  const rows = (data.groups || []).map(g => ({
    label: String(g.group ?? g[Object.keys(g)[0]]),
    value: g.proportion,
    displayVal: pct(g.proportion),
    isDesert: g.is_desert,
    count: g.count,
  }));

  const deserts = rows.filter(r => r.isDesert);
  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
        <span className={`badge ${deserts.length ? 'fail' : 'pass'}`}>
          {deserts.length ? `${deserts.length} DESERT${deserts.length>1?'S':''} FOUND` : 'NO DESERTS'}
        </span>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:'var(--text2)'}}>
          Threshold: {pct(data.threshold)}
        </span>
      </div>
      <BarChart
        rows={rows}
        dangerAt={data.threshold}
        colorFn={r => r.isDesert ? 'bad' : 'good'}
      />
      {deserts.length > 0 && (
        <p style={{fontSize:13,color:'var(--text2)',marginTop:16,lineHeight:1.6}}>
          ⚠ Groups below {pct(data.threshold)} are underrepresented and may cause unreliable model performance for those subgroups.
        </p>
      )}
    </div>
  );
}

/* ── Proxy ── */
function ProxyResult({ data }) {
  if (data.error) return <div className="error-card">⚠ {data.error}</div>;
  const proxies = data.proxies || [];
  if (proxies.length === 0) {
    return (
      <div>
        <span className="badge pass">NO PROXIES DETECTED</span>
        <p style={{fontSize:14,color:'var(--text2)',marginTop:16,lineHeight:1.6}}>
          No features were found that strongly predict the protected attribute at the current sensitivity level.
        </p>
      </div>
    );
  }

  const maxScore = Math.max(...proxies.map(p => p.score ?? p.cov ?? 1), 1);
  return (
    <div>
      <span className="badge fail">{proxies.length} PROXY VARIABLE{proxies.length>1?'S':''} DETECTED</span>
      <div style={{marginTop:20}}>
        {proxies.map((p, i) => {
          const name = p.feature ?? p.index ?? `Feature ${i}`;
          const cov = clamp((p.cov ?? 0) / (proxies.length || 1) * 100, 0, 100);
          const mi  = clamp((p.mi  ?? 0) / (proxies.length || 1) * 100, 0, 100);
          const rf  = clamp((p.rf  ?? 0) / (proxies.length || 1) * 100, 0, 100);
          return (
            <div key={i} className="proxy-feature">
              <div className="proxy-feature-name">
                <span>⚡</span>{name}
                <span className={`badge fail`} style={{fontSize:10,padding:'2px 8px'}}>PROXY</span>
              </div>
              <div className="proxy-mini-bars">
                {[['COV','pmf-cov',cov,p.cov],['MI','pmf-mi',mi,p.mi],['RF','pmf-rf',rf,p.rf]].map(([l,cls,w,raw]) => (
                  <div key={l} className="proxy-mini-bar-wrap">
                    <div className="proxy-mini-label">{l}</div>
                    <div className="proxy-mini-track">
                      <div className={`proxy-mini-fill ${cls}`} style={{width:`${w}%`}}/>
                    </div>
                    <div className="proxy-mini-val">rank {fmt(raw,1)}</div>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
      <p style={{fontSize:13,color:'var(--text2)',marginTop:8,lineHeight:1.6}}>
        These features are highly correlated with the protected attribute. Including them may introduce indirect discrimination even if the protected attribute is excluded.
      </p>
    </div>
  );
}

/* ── Intersectional ── */
function IntersectionalResult({ data }) {
  if (data.error) return <div className="error-card">⚠ {data.error}</div>;
  const pass = !data.is_gap;
  const groups = data.groups || [];

  const maxRate = Math.max(...groups.map(g=>g.rate), 1);

  const getColor = rate => {
    if (rate >= 0.7) return 'var(--pass)';
    if (rate >= 0.4) return 'var(--warn)';
    return 'var(--fail)';
  };

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
        <span className={`badge ${pass ? 'pass' : 'fail'}`}>
          {pass ? 'WITHIN SAFE MARGINS' : 'GAP DETECTED'}
        </span>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:'var(--text2)'}}>
          Gap: {pct(data.gap)}
        </span>
      </div>
      <div className="metric-row">
        <span className={`metric-big ${pass ? 'good' : 'bad'}`}>{pct(data.gap)}</span>
        <span className="metric-label">Max intersectional gap</span>
      </div>
      <table className="data-table" style={{marginTop:20}}>
        <thead>
          <tr>
            {groups[0] && Object.keys(groups[0]).filter(k=>k!=='rate'&&k!=='count').map(k=>(
              <th key={k}>{k}</th>
            ))}
            <th>Approval Rate</th>
            <th>Count</th>
          </tr>
        </thead>
        <tbody>
          {groups.map((g,i) => {
            const keys = Object.keys(g).filter(k=>k!=='rate'&&k!=='count');
            const color = getColor(g.rate);
            return (
              <tr key={i}>
                {keys.map(k=>(
                  <td key={k} className="td-val">{Array.isArray(g[k]) ? g[k].join(', ') : String(g[k])}</td>
                ))}
                <td>
                  <span className="rate-pill" style={{
                    background:`${color}18`,
                    color,
                    border:`1px solid ${color}40`
                  }}>
                    {pct(g.rate)}
                  </span>
                </td>
                <td style={{color:'var(--text3)'}}>{g.count}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

/* ── Loading ── */
function Loading() {
  const [step, setStep] = useState(0);
  const steps = [
    '→ Running Disparate Impact analysis...',
    '→ Scanning for data deserts...',
    '→ Training proxy detector (RF + MI)...',
    '→ Computing intersectional gaps...',
  ];
  useEffect(() => {
    const t = setInterval(() => setStep(s => Math.min(s+1, steps.length-1)), 900);
    return () => clearInterval(t);
  }, []);
  return (
    <div className="loading-wrap">
      <div className="spinner"/>
      <p>Running 4-part fairness X-ray...</p>
      <div className="loading-steps">
        {steps.map((s,i) => (
          <div key={i} className={`loading-step ${i<=step?'active':''}`}
               style={{animationDelay:`${i*0.9}s`}}>
            <span>{i<step ? '✓' : i===step ? '◉' : '○'}</span> {s}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── Main App ── */
function App() {
  const [file, setFile] = useState(null);
  const [columns, setColumns] = useState([]);
  const [config, setConfig] = useState({
    target_col: '', fav_outcome: '1',
    prot_col: '', priv_class: '', unpriv_class: '',
    threshold_45: 0.80, desert_thresh: 0.10,
    proxy_thresh: 50, sec_prot: ''
  });
  const [loading, setLoading] = useState(false);
  const [results, setResults] = useState(null);
  const [error, setError] = useState(null);
  const [drag, setDrag] = useState(false);
  const [csvData, setCsvData] = useState(null);
  const fileInputRef = useRef();

  const handleFile = useCallback(async (f) => {
    if (!f || !f.name.endsWith('.csv')) {
      setError('Please upload a CSV file.'); return;
    }
    setFile(f);
    setError(null);
    setResults(null);
    const text = await f.text();
    const parsed = await parseCSV(text);
    const cols = parsed.meta.fields || [];
    setColumns(cols);
    setCsvData(parsed.data);
    setConfig(prev => ({
      ...prev,
      target_col: cols[cols.length-1] || '',
      prot_col: cols[0] || '',
      sec_prot: cols[1] || cols[0] || '',
    }));
  }, []);

  const handleDrop = useCallback(e => {
    e.preventDefault(); setDrag(false);
    const f = e.dataTransfer.files[0];
    if (f) handleFile(f);
  }, [handleFile]);

  const set = (key) => (val) => setConfig(p => ({...p, [key]: val}));

  // Simulate API locally using CSV data
  const runDiagnostics = async () => {
    if (!csvData || csvData.length === 0) { setError('No data loaded.'); return; }
    setLoading(true);
    setError(null);
    setResults(null);

    await new Promise(r => setTimeout(r, 3500)); // simulate analysis time

    try {
      const df = csvData;
      const { target_col, fav_outcome, prot_col, priv_class, unpriv_class,
              threshold_45, desert_thresh, proxy_thresh, sec_prot } = config;

      const coerce = v => {
        const n = Number(v);
        return isNaN(n) ? v : n;
      };
      const fav = coerce(fav_outcome);
      const priv = coerce(priv_class);
      const unpriv = coerce(unpriv_class);

      /* 1. Disparate Impact */
      const privRows = df.filter(r => coerce(r[prot_col]) === priv);
      const unprivRows = df.filter(r => coerce(r[prot_col]) === unpriv);
      let di_result;
      if (privRows.length === 0 || unprivRows.length === 0) {
        di_result = { ratio: null, is_legal: false, threshold: threshold_45 };
      } else {
        const privFav = privRows.filter(r => coerce(r[target_col]) === fav).length;
        const unprivFav = unprivRows.filter(r => coerce(r[target_col]) === fav).length;
        const pr = privFav / privRows.length;
        const ur = unprivFav / unprivRows.length;
        const ratio = pr > 0 ? ur / pr : null;
        di_result = { ratio, is_legal: ratio != null && ratio >= threshold_45, threshold: threshold_45 };
      }

      /* 2. Data Desert */
      const groupCounts = {};
      df.forEach(r => { const g = r[prot_col]; groupCounts[g] = (groupCounts[g]||0) + 1; });
      const total = df.length;
      const desertGroups = Object.entries(groupCounts).map(([g,c]) => ({
        group: g, count: c, proportion: c/total, is_desert: (c/total) < desert_thresh
      })).sort((a,b) => a.proportion - b.proportion);
      const desert_result = { threshold: desert_thresh, groups: desertGroups };

      /* 3. Proxy — simplified correlation */
      const numericCols = Object.keys(df[0] || {}).filter(c => c !== target_col && c !== prot_col);
      // encode protected attr
      const protVals = df.map(r => r[prot_col]);
      const uniqueProt = [...new Set(protVals)];
      const protEnc = df.map(r => uniqueProt.indexOf(r[prot_col]));

      const sensitivityThresh = proxy_thresh / 100;
      const proxies = [];
      numericCols.forEach(col => {
        const vals = df.map(r => {
          const v = r[col];
          const n = parseFloat(v);
          if (!isNaN(n)) return n;
          const uniq = [...new Set(df.map(x=>x[col]))];
          return uniq.indexOf(v);
        });
        // pearson correlation
        const n = vals.length;
        const mx = vals.reduce((s,v)=>s+v,0)/n;
        const mp = protEnc.reduce((s,v)=>s+v,0)/n;
        const num = vals.reduce((s,v,i)=>s+(v-mx)*(protEnc[i]-mp),0);
        const dx = Math.sqrt(vals.reduce((s,v)=>s+(v-mx)**2,0));
        const dp = Math.sqrt(protEnc.reduce((s,v)=>s+(v-mp)**2,0));
        const corr = (dx>0&&dp>0) ? Math.abs(num/(dx*dp)) : 0;
        if (corr > sensitivityThresh) {
          proxies.push({ feature: col, cov: corr*5, mi: corr*4.5, rf: corr*4.8, score: corr*5 });
        }
      });
      const proxy_result = { proxies, count: proxies.length };

      /* 4. Intersectional */
      const groupKeys = [prot_col, sec_prot].filter(Boolean);
      const interMap = {};
      df.forEach(r => {
        const key = groupKeys.map(k=>r[k]).join(' / ');
        if (!interMap[key]) interMap[key] = {key, total:0, fav:0};
        interMap[key].total++;
        if (coerce(r[target_col]) === fav) interMap[key].fav++;
      });
      const interGroups = Object.entries(interMap).map(([k,v]) => {
        const obj = {rate: v.fav/v.total, count: v.total};
        groupKeys.forEach((gk,i) => { obj[gk] = k.split(' / ')[i]; });
        return obj;
      }).sort((a,b) => a.rate - b.rate);
      const rates = interGroups.map(g=>g.rate);
      const gap = rates.length ? Math.max(...rates) - Math.min(...rates) : 0;
      const inter_result = { gap, is_gap: gap >= 0.2, groups: interGroups };

      setResults({
        disparate_impact: di_result,
        data_desert: desert_result,
        proxy: proxy_result,
        intersection: inter_result,
      });
    } catch(e) {
      setError('Analysis failed: ' + e.message);
    }
    setLoading(false);
  };

  const selField = (key, label, tip) => (
    <div className="field">
      <label>{label}{tip && <span className="info-tip" data-tip={tip}>?</span>}</label>
      <select value={config[key]} onChange={e => set(key)(e.target.value)}>
        <option value="">— select —</option>
        {columns.map(c => <option key={c} value={c}>{c}</option>)}
      </select>
    </div>
  );
  const txtField = (key, label, ph) => (
    <div className="field">
      <label>{label}</label>
      <input type="text" placeholder={ph} value={config[key]} onChange={e => set(key)(e.target.value)}/>
    </div>
  );

  return (
    <>
      <header className="header">
        <div className="header-logo">
          <div className="logo-icon">⚖</div>
          Bias Diagnostic Clinic
        </div>
        <span className="header-badge">v2.0 · REACT</span>
      </header>

      <div className="hero">
        <div className="hero-label">AI Fairness Auditing</div>
        <h1>4-Part Fairness<br/><span>X-Ray Engine</span></h1>
        <p className="hero-desc">Upload your training data to run a comprehensive bias diagnostic across disparate impact, data deserts, proxy variables, and intersectional gaps.</p>
      </div>

      <div className="main">
        {/* Upload */}
        <div
          className={`upload-zone ${drag ? 'drag-over' : ''}`}
          onClick={() => fileInputRef.current.click()}
          onDrop={handleDrop}
          onDragOver={e => { e.preventDefault(); setDrag(true); }}
          onDragLeave={() => setDrag(false)}
        >
          <input ref={fileInputRef} type="file" accept=".csv" style={{display:'none'}}
            onChange={e => handleFile(e.target.files[0])}/>
          <div className="upload-icon">📊</div>
          <h3>{file ? 'Click to change file' : 'Drop your CSV here'}</h3>
          <p>{file ? '' : 'or click to browse — CSV files only'}</p>
          {file && (
            <div className="upload-file-name">
              ✓ {file.name} · {csvData?.length?.toLocaleString()} rows · {columns.length} cols
            </div>
          )}
        </div>

        {/* Config */}
        {columns.length > 0 && (
          <>
            <div className="config-grid" style={{marginTop:32}}>
              <div className="config-card">
                <h4><span className="dot"/> Target & Outcome</h4>
                {selField('target_col','Target Column','The column containing the outcome to audit (e.g. Approved)')}
                {txtField('fav_outcome','Favorable Outcome','e.g. 1 or Yes')}
              </div>
              <div className="config-card">
                <h4><span className="dot"/> Protected Attribute</h4>
                {selField('prot_col','Protected Attribute','The column representing the protected group')}
                {txtField('priv_class','Privileged Class','e.g. Male or White')}
                {txtField('unpriv_class','Unprivileged Class','e.g. Female or Hispanic')}
              </div>
              <div className="config-card">
                <h4><span className="dot"/> Thresholds</h4>
                <Slider label="4/5ths Rule Threshold" value={config.threshold_45} min={0} max={1} step={0.01}
                  onChange={set('threshold_45')} tooltip="Minimum ratio of unprivileged to privileged selection rate"/>
                <Slider label="Data Desert Threshold" value={config.desert_thresh} min={0} max={0.5} step={0.01}
                  onChange={set('desert_thresh')} tooltip="Groups below this proportion are flagged as underrepresented"/>
                <Slider label="Proxy Sensitivity" value={config.proxy_thresh} min={0} max={100} step={1}
                  onChange={set('proxy_thresh')} tooltip="Higher = more sensitive, flags more features as potential proxies"/>
                {selField('sec_prot','Secondary Attribute (Intersectional)','Used to compute intersectional subgroup gaps')}
              </div>
            </div>

            <button className="run-btn" onClick={runDiagnostics}
              disabled={loading || !config.target_col || !config.prot_col}>
              {loading ? 'Running Analysis...' : '⚡ Run Fairness Diagnostics'}
            </button>
          </>
        )}

        {/* Loading */}
        {loading && <Loading/>}

        {/* Error */}
        {error && !loading && (
          <div className="error-card" style={{marginTop:24}}>
            <span>⚠</span><div>{error}</div>
          </div>
        )}

        {/* Results */}
        {results && !loading && (
          <>
            <div className="results-header">
              <h2>Diagnostic Report</h2>
              <span className="badge warn">4 TESTS COMPLETE</span>
            </div>

            <Section num={1} title="Disparate Impact — 4/5ths Rule Legal Check">
              <DisparateImpactResult data={results.disparate_impact}/>
            </Section>

            <Section num={2} title="Data Desert Test — Class Imbalance">
              <DataDesertResult data={results.data_desert}/>
            </Section>

            <Section num={3} title="Proxy Variable Radar">
              <ProxyResult data={results.proxy}/>
            </Section>

            <Section num={4} title="Intersectional Gap Test">
              <IntersectionalResult data={results.intersection}/>
            </Section>
          </>
        )}

        {/* Empty state */}
        {!file && !loading && (
          <div className="empty-state" style={{marginTop:48}}>
            <div className="empty-icon">⚖️</div>
            <p>Upload a CSV to begin your fairness audit</p>
          </div>
        )}
      </div>
    </>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
